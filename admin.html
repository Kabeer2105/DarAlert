<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#e61b23" />
  <title>DarAlert Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <p class="eyebrow">Admin Only</p>
      <h1>DarAlert Admin</h1>
      <p class="tagline">Verify, respond, and keep Dar es Salaam safe.</p>
      <div class="hero-actions">
        <a class="ghost" href="index.html">Back to Emergency</a>
      </div>
    </div>
  </header>

  <main class="grid">
    <section class="card admin">
      <div class="card-header">
        <h2 id="pageTitle">Sign In</h2>
        <p id="pageSubtitle">Enter your username and password.</p>
      </div>

      <div class="admin-body">

        <!-- Auth panel — shown when signed out -->
        <div id="authPanel" class="admin-panel">
          <label class="field">
            <span>Username</span>
            <input id="usernameInput" type="text" placeholder="e.g. kabeer" autocomplete="username" />
          </label>
          <label class="field">
            <span>Password</span>
            <input id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <div class="hero-actions">
            <button id="signInBtn" class="ghost">Sign In</button>
            <button id="signUpBtn" class="ghost">Create Account</button>
          </div>
          <p id="authStatus" class="status"></p>
        </div>

        <!-- Signed-in panel — shown when signed in but not admin -->
        <div id="pendingPanel" class="admin-panel" hidden>
          <p id="pendingStatus" class="note"></p>
          <div class="hero-actions">
            <button id="requestAdminBtn" class="ghost">Request Admin Access</button>
            <button id="signOutBtn1" class="ghost">Sign Out</button>
          </div>
        </div>

        <!-- Admin panel — shown when verified admin -->
        <div id="adminPanel" hidden>

          <div class="admin-panel">
            <p id="adminWelcome" class="note"></p>
            <div class="hero-actions">
              <button id="enablePushBtn" class="ghost">Enable Push Notifications</button>
              <button id="signOutBtn2" class="ghost">Sign Out</button>
            </div>
            <p id="pushStatus" class="note"></p>
          </div>

          <!-- Admin requests -->
          <div class="admin-panel">
            <h3>Admin Requests</h3>
            <div id="requestsList" class="alerts-list">
              <p class="note">No pending requests.</p>
            </div>
          </div>

          <!-- Live alerts -->
          <div class="admin-panel">
            <h3>Live Alerts</h3>
            <div id="alertsList" class="alerts-list">
              <p class="note">No alerts yet.</p>
            </div>
          </div>

        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Built for community response in Dar es Salaam.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="admin.js" defer></script>
</body>
</html>
